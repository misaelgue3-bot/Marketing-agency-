<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Your LocalLift — Admin</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    /* dark theme — same variable names the app logic already uses */
    --bg: #10191c; --surface: #1b282c; --surface-2: #223136; --line: rgba(255, 255, 255, 0.09);
    --ink: #e8f0ee; --ink-soft: #9fb9b4; --ink-muted: #74898d;
    --brand: #e8542f; --brand-2: #f0703c; --gold: #ffb525; --teal: #3fbfa8;
    --good: #4fd08c; --warn: #ffc754; --bad: #ff7a6e;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Inter", system-ui, sans-serif; background: var(--bg); color: var(--ink); font-size: 15px; line-height: 1.55; }
  button { font: inherit; cursor: pointer; }
  ::selection { background: rgba(255, 181, 37, 0.35); }
  input, select, textarea {
    font: inherit; padding: 0.55rem 0.75rem; border: 1.5px solid var(--line); border-radius: 10px;
    background: #131e22; color: var(--ink); width: 100%;
  }
  input::placeholder, textarea::placeholder { color: var(--ink-muted); }
  input:focus, select:focus, textarea:focus { outline: 2px solid var(--gold); outline-offset: 1px; border-color: transparent; }
  select option { background: #131e22; }
  a { color: var(--teal); }

  /* ---------- layout: sidebar + content ---------- */
  .app { display: flex; min-height: 100vh; }
  aside {
    width: 232px; flex: none;
    background: linear-gradient(180deg, #16232780, transparent), #141f23;
    border-right: 1px solid var(--line);
    display: flex; flex-direction: column;
    padding: 1.3rem 0.9rem 1rem;
    position: sticky; top: 0; height: 100vh;
  }
  .side-logo {
    font-family: "Bricolage Grotesque", sans-serif; font-weight: 800; font-size: 1.25rem;
    color: #fff; padding: 0 0.7rem 1.1rem; letter-spacing: -0.01em;
  }
  .side-logo span { color: var(--gold); }
  .side-logo small { display: block; font-size: 0.68rem; font-weight: 600; color: var(--ink-muted); letter-spacing: 0.14em; text-transform: uppercase; margin-top: 2px; }
  nav { display: flex; flex-direction: column; gap: 0.2rem; }
  nav button {
    display: flex; align-items: center; gap: 0.65rem;
    background: none; border: 0; color: var(--ink-soft);
    padding: 0.6rem 0.75rem; border-radius: 10px; font-weight: 600; font-size: 0.92rem;
    text-align: left; width: 100%; transition: background 0.12s, color 0.12s;
  }
  nav button .ico { font-size: 1.02rem; width: 1.4rem; text-align: center; flex: none; }
  nav button:hover { color: #fff; background: rgba(255, 255, 255, 0.05); }
  nav button.on { background: linear-gradient(90deg, rgba(232, 84, 47, 0.28), rgba(232, 84, 47, 0.1)); color: #fff; box-shadow: inset 2px 0 0 var(--brand-2); }
  .side-foot { margin-top: auto; padding: 0.9rem 0.75rem 0; border-top: 1px solid var(--line); font-size: 0.85rem; }
  .side-foot a { color: var(--ink-soft); text-decoration: none; font-weight: 600; display: block; padding: 0.3rem 0; }
  .side-foot a:hover { color: var(--gold); }

  .content { flex: 1; min-width: 0; }
  main { max-width: 1120px; margin: 0 auto; padding: 1.8rem 1.6rem 4rem; }
  h2 { font-family: "Bricolage Grotesque", sans-serif; font-size: 1.55rem; font-weight: 800; margin-bottom: 1.1rem; letter-spacing: -0.01em; }
  h3 { font-size: 1rem; }

  /* ---------- tiles ---------- */
  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(175px, 1fr)); gap: 0.9rem; margin-bottom: 1.4rem; }
  .tile {
    background: linear-gradient(160deg, var(--surface-2), var(--surface));
    border: 1px solid var(--line); border-radius: var(--radius); padding: 1rem 1.15rem;
  }
  .tile .label { font-size: 0.72rem; font-weight: 700; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .tile .value { font-family: "Bricolage Grotesque", sans-serif; font-size: 1.8rem; font-weight: 800; margin-top: 0.15rem; color: #fff; }
  .tile:first-child .value { color: var(--gold); }
  .tile .sub { font-size: 0.8rem; color: var(--ink-muted); }

  .panel { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 1.2rem 1.3rem; margin-bottom: 1.3rem; }
  .panel-head { display: flex; justify-content: space-between; align-items: center; gap: 1rem; margin-bottom: 0.9rem; flex-wrap: wrap; }

  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  th, td { text-align: left; padding: 0.6rem 0.65rem; border-bottom: 1px solid var(--line); vertical-align: top; }
  th { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--ink-muted); }
  tr:hover td { background: rgba(255, 255, 255, 0.025); }
  td .small { font-size: 0.8rem; color: var(--ink-muted); }
  .table-wrap { overflow-x: auto; }

  .btn { border: 0; border-radius: 999px; padding: 0.5rem 1.05rem; font-weight: 700; font-size: 0.85rem; }
  .btn-primary { background: linear-gradient(135deg, var(--brand), var(--brand-2)); color: #fff; }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-teal { background: var(--teal); color: #0d1a17; }
  .btn-teal:hover { filter: brightness(1.08); }
  .btn-ghost { background: none; border: 1.5px solid var(--line); color: var(--ink-soft); }
  .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
  .btn-sm { padding: 0.3rem 0.75rem; font-size: 0.78rem; }
  .btn[disabled] { opacity: 0.5; cursor: wait; }

  .pill { display: inline-block; padding: 0.12rem 0.6rem; border-radius: 999px; font-size: 0.75rem; font-weight: 700; }
  .pill.active, .pill.approved, .pill.live, .pill.converted { background: rgba(79, 208, 140, 0.16); color: var(--good); }
  .pill.new, .pill.draft { background: rgba(240, 112, 60, 0.18); color: #ff9d73; }
  .pill.contacted { background: rgba(255, 199, 84, 0.15); color: var(--warn); }
  .pill.paused { background: rgba(255, 255, 255, 0.08); color: var(--ink-soft); }
  .pill.churned, .pill.closed, .pill.archived { background: rgba(255, 122, 110, 0.15); color: var(--bad); }

  form.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(185px, 1fr)); gap: 0.75rem; align-items: end; }
  form.grid label { font-size: 0.76rem; font-weight: 600; color: var(--ink-soft); display: grid; gap: 0.3rem; }
  form.grid .full { grid-column: 1 / -1; }

  /* ---------- revenue chart ---------- */
  .chart { display: flex; align-items: flex-end; gap: 10px; height: 190px; padding-top: 0.5rem; }
  .chart .col { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; gap: 6px; height: 100%; position: relative; }
  .chart .bar { width: 100%; max-width: 64px; background: linear-gradient(180deg, var(--gold), var(--brand-2)); border-radius: 6px 6px 0 0; min-height: 2px; transition: filter 0.15s; }
  .chart .col:hover .bar { filter: brightness(1.15); }
  .chart .val { font-size: 0.78rem; font-weight: 700; color: var(--ink-soft); }
  .chart .lbl { font-size: 0.75rem; color: var(--ink-muted); }

  .empty { padding: 2.2rem; text-align: center; color: var(--ink-muted); }
  .notice { padding: 0.75rem 1rem; border-radius: 12px; font-size: 0.87rem; margin-bottom: 1rem; border: 1px solid; }
  .notice.warn { background: rgba(255, 199, 84, 0.09); border-color: rgba(255, 199, 84, 0.3); color: var(--warn); }
  .notice.ok { background: rgba(79, 208, 140, 0.09); border-color: rgba(79, 208, 140, 0.28); color: var(--good); }

  dialog { border: 1px solid var(--line); border-radius: var(--radius); padding: 0; max-width: 760px; width: 92%; max-height: 85vh; background: var(--surface); color: var(--ink); }
  dialog::backdrop { background: rgba(6, 12, 14, 0.72); }
  .dialog-body { padding: 1.4rem; overflow-y: auto; max-height: 85vh; }
  .dialog-body h3 { margin: 1.1rem 0 0.4rem; color: var(--teal); }
  .dialog-body h3:first-of-type { margin-top: 0.8rem; }
  .ad-card { border: 1px solid var(--line); background: var(--surface-2); border-radius: 12px; padding: 0.8rem 1rem; margin: 0.5rem 0; }
  .ad-card .platform { font-size: 0.75rem; font-weight: 700; color: var(--gold); text-transform: uppercase; }
  .close-x { float: right; background: none; border: 0; font-size: 1.3rem; color: var(--ink-muted); }
  .close-x:hover { color: #fff; }
  pre { color: var(--ink-soft); }
  #toast {
    position: fixed; bottom: 1.2rem; left: 50%; transform: translateX(-50%);
    background: var(--gold); color: #1d2c30; padding: 0.7rem 1.3rem; border-radius: 999px;
    font-size: 0.88rem; font-weight: 700; opacity: 0; transition: opacity 0.25s; pointer-events: none; z-index: 50;
  }
  #toast.show { opacity: 1; }

  /* ---------- small screens: sidebar becomes a top bar ---------- */
  @media (max-width: 880px) {
    .app { flex-direction: column; }
    aside { width: 100%; height: auto; position: static; flex-direction: column; padding: 0.9rem 0.9rem 0.6rem; border-right: 0; border-bottom: 1px solid var(--line); }
    .side-logo { padding-bottom: 0.6rem; }
    nav { flex-direction: row; overflow-x: auto; gap: 0.25rem; padding-bottom: 0.4rem; scrollbar-width: none; }
    nav::-webkit-scrollbar { display: none; }
    nav button { white-space: nowrap; width: auto; padding: 0.5rem 0.8rem; }
    nav button.on { box-shadow: inset 0 -2px 0 var(--brand-2); }
    .side-foot { display: none; }
    main { padding: 1.2rem 1rem 3rem; }
  }
</style>
</head>
<body>

<div class="app">
  <aside>
    <div class="side-logo">Local<span>Lift</span><small>Panel de control</small></div>
    <nav id="nav">
      <button data-tab="dashboard" class="on"><span class="ico">📊</span> Dashboard</button>
      <button data-tab="leads"><span class="ico">📥</span> Leads</button>
      <button data-tab="clients"><span class="ico">👥</span> Clients</button>
      <button data-tab="payments"><span class="ico">💵</span> Payments</button>
      <button data-tab="campaigns"><span class="ico">✨</span> AI Campaigns</button>
      <button data-tab="outbox"><span class="ico">📤</span> Outbox</button>
      <button data-tab="settings"><span class="ico">⚙️</span> Settings</button>
    </nav>
    <div class="side-foot">
      <a href="/" target="_blank" rel="noopener">↗ Ver mi sitio</a>
      <a href="/sofia-app.html" target="_blank" rel="noopener">💬 Probar a Sofía</a>
    </div>
  </aside>
  <div class="content">
    <main id="main"></main>
  </div>
</div>
<dialog id="modal"><div class="dialog-body" id="modal-body"></div></dialog>
<div id="toast" role="status"></div>

<script>
const $ = (sel, el = document) => el.querySelector(sel);
const main = $('#main');
const money = (n) => '$' + Number(n || 0).toLocaleString('en-US', { maximumFractionDigits: 0 });
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

async function api(path, opts = {}) {
  const res = await fetch('/api/admin' + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || res.statusText);
  return data;
}

function toast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

/* ================= Dashboard ================= */

async function renderDashboard() {
  const o = await api('/overview');
  const max = Math.max(...o.revenueByMonth.map((m) => m.revenue), 1);
  const monthName = (key) => new Date(key + '-15').toLocaleString('en-US', { month: 'short' });

  main.innerHTML = `
    <h2>Dashboard</h2>
    ${o.aiEnabled ? `<div class="notice ok">AI team is on — running on <strong>${esc(o.aiProvider)}</strong>.</div>` : `<div class="notice warn">The AI team is off — add <strong>ANTHROPIC_API_KEY</strong> (Claude, best quality) or <strong>GROQ_API_KEY</strong> (Groq, free tier) to your .env to turn on Sofía, Marco, Lucía and Valen.</div>`}
    ${o.aiEnabled && !o.imagesEnabled ? `<div class="notice warn">Ad images are off — add <strong>HIGGSFIELD_API_KEY</strong> + <strong>HIGGSFIELD_API_SECRET</strong> to let Valen generate real ad visuals.</div>` : ''}
    ${o.automations ? `<div class="panel" style="padding:0.9rem 1.2rem;margin-bottom:1.3rem">
      <strong style="font-size:0.85rem">Autopilot:</strong>
      ${[
        ['Lead auto-reply', o.automations.leadReply],
        ['Monthly check-ins', o.automations.monthlyCheckins],
        ['Payment reminders', o.automations.paymentReminders],
        ['Auto campaigns', o.automations.campaigns],
        ['Weekly digest', o.automations.weeklyDigest],
        ['Email sending', o.automations.email],
      ].map(([n, on]) => `<span class="pill ${on ? 'active' : 'paused'}" style="margin-left:0.5rem">${n}: ${on ? 'ON' : 'off'}</span>`).join('')}
    </div>` : ''}
    <div class="tiles">
      <div class="tile"><div class="label">Monthly recurring</div><div class="value">${money(o.mrr)}</div><div class="sub">from ${o.activeClients} active client${o.activeClients === 1 ? '' : 's'}</div></div>
      <div class="tile"><div class="label">Total collected</div><div class="value">${money(o.totalRevenue)}</div><div class="sub">all recorded payments</div></div>
      <div class="tile"><div class="label">Clients</div><div class="value">${o.activeClients}<span style="font-size:1rem;color:var(--ink-muted)"> / ${o.totalClients}</span></div><div class="sub">active / total</div></div>
      <div class="tile"><div class="label">New leads</div><div class="value">${o.newLeads}</div><div class="sub">${o.totalLeads} all time</div></div>
      <div class="tile"><div class="label">Draft campaigns</div><div class="value">${o.draftCampaigns}</div><div class="sub">waiting for your review</div></div>
    </div>
    <div class="panel">
      <div class="panel-head"><h3>Revenue — last 6 months</h3></div>
      <div class="chart" role="img" aria-label="Bar chart of revenue for the last six months">
        ${o.revenueByMonth.map((m) => `
          <div class="col" title="${monthName(m.month)}: ${money(m.revenue)}">
            <span class="val">${m.revenue ? money(m.revenue) : ''}</span>
            <div class="bar" style="height:${Math.round((m.revenue / max) * 100)}%"></div>
            <span class="lbl">${monthName(m.month)}</span>
          </div>`).join('')}
      </div>
    </div>`;
}

/* ================= Leads ================= */

async function renderLeads() {
  const leads = await api('/leads');
  main.innerHTML = `
    <h2>Leads</h2>
    <div class="panel"><div class="table-wrap">
    ${leads.length ? `<table>
      <thead><tr><th>Received</th><th>Contact</th><th>Business</th><th>Interest</th><th>Message</th><th>Status</th><th></th></tr></thead>
      <tbody>${leads.map((l) => `
        <tr>
          <td>${new Date(l.receivedAt).toLocaleDateString()}<div class="small">${new Date(l.receivedAt).toLocaleTimeString()}</div></td>
          <td>${esc(l.name)}<div class="small"><a href="mailto:${esc(l.email)}">${esc(l.email)}</a>${l.phone ? ' · ' + esc(l.phone) : ''}</div></td>
          <td>${esc(l.business)}</td>
          <td>${esc(l.plan || '')}<div class="small">${esc(l.budget || '')}</div></td>
          <td style="max-width:280px">${esc(l.message)}</td>
          <td>
            <select data-lead-status="${l.id}" aria-label="Lead status">
              ${['new', 'contacted', 'converted', 'closed'].map((s) => `<option ${l.status === s ? 'selected' : ''}>${s}</option>`).join('')}
            </select>
          </td>
          <td style="white-space:nowrap">
            ${l.status !== 'converted' ? `<button class="btn btn-teal btn-sm" data-convert="${l.id}">→ Client</button>` : ''}
            <button class="btn btn-ghost btn-sm" data-del-lead="${l.id}">Delete</button>
          </td>
        </tr>`).join('')}</tbody>
    </table>` : `<div class="empty">No leads yet. They arrive here when someone submits the website form.</div>`}
    </div></div>`;
}

/* ================= Clients ================= */

const PLANS = ['Inicial', 'Crecimiento', 'Pro', 'Custom'];

async function renderClients() {
  const clients = await api('/clients');
  main.innerHTML = `
    <h2>Clients</h2>
    <div class="panel">
      <div class="panel-head"><h3>Add a client</h3></div>
      <form class="grid" id="client-form">
        <label>Owner name<input name="name" required></label>
        <label>Business<input name="business" required></label>
        <label>Email<input name="email" type="email"></label>
        <label>Phone / WhatsApp<input name="phone"></label>
        <label>Plan<select name="plan">${PLANS.map((p) => `<option>${p}</option>`).join('')}</select></label>
        <label>Monthly fee ($)<input name="monthlyFee" type="number" min="0" value="399"></label>
        <label>Industry<input name="industry" placeholder="restaurant, salon, taller..."></label>
        <label class="full">Goals / notes for the AI agents<textarea name="goals" rows="2" placeholder="E.g. wants more weekend customers; bilingual audience; best sellers are..."></textarea></label>
        <div><button class="btn btn-primary">Add client</button></div>
      </form>
    </div>
    <div class="panel"><div class="table-wrap">
    ${clients.length ? `<table>
      <thead><tr><th>Business</th><th>Plan</th><th>Fee/mo</th><th>Paid total</th><th>Campaigns</th><th>Status</th><th></th></tr></thead>
      <tbody>${clients.map((c) => `
        <tr>
          <td>${esc(c.business)}<div class="small">${esc(c.name)} · ${esc(c.email)}</div></td>
          <td>${esc(c.plan)}</td>
          <td>${money(c.monthlyFee)}</td>
          <td>${money(c.totalPaid)}</td>
          <td>${c.campaigns}</td>
          <td>
            <select data-client-status="${c.id}" aria-label="Client status">
              ${['active', 'paused', 'churned'].map((s) => `<option ${c.status === s ? 'selected' : ''}>${s}</option>`).join('')}
            </select>
          </td>
          <td style="white-space:nowrap">
            <button class="btn btn-teal btn-sm" data-gen="${c.id}">✨ Campaign</button>
            <button class="btn btn-ghost btn-sm" data-msg="${c.id}">💬 Message</button>
            <button class="btn btn-ghost btn-sm" data-del-client="${c.id}">Delete</button>
          </td>
        </tr>`).join('')}</tbody>
    </table>` : `<div class="empty">No clients yet. Add one above, or convert a lead.</div>`}
    </div></div>`;
}

/* ================= Payments ================= */

async function renderPayments() {
  const [payments, clients] = await Promise.all([api('/payments'), api('/clients')]);
  main.innerHTML = `
    <h2>Payments</h2>
    <div class="panel">
      <div class="panel-head"><h3>Record a payment</h3></div>
      <form class="grid" id="payment-form">
        <label>Client<select name="clientId" required>
          <option value="">Choose…</option>
          ${clients.map((c) => `<option value="${c.id}">${esc(c.business || c.name)}</option>`).join('')}
        </select></label>
        <label>Amount ($)<input name="amount" type="number" min="1" step="0.01" required></label>
        <label>Date<input name="date" type="date" value="${new Date().toISOString().slice(0, 10)}"></label>
        <label>Method<select name="method"><option>Zelle</option><option>Cash</option><option>Card</option><option>Transfer</option><option>Other</option></select></label>
        <label>Note<input name="note" placeholder="July retainer"></label>
        <div><button class="btn btn-primary">Record</button></div>
      </form>
    </div>
    <div class="panel"><div class="table-wrap">
    ${payments.length ? `<table>
      <thead><tr><th>Date</th><th>Client</th><th>Amount</th><th>Method</th><th>Note</th><th></th></tr></thead>
      <tbody>${payments.map((p) => `
        <tr>
          <td>${esc(p.date)}</td>
          <td>${esc(p.clientName)}</td>
          <td><strong>${money(p.amount)}</strong></td>
          <td>${esc(p.method)}</td>
          <td>${esc(p.note)}</td>
          <td><button class="btn btn-ghost btn-sm" data-del-payment="${p.id}">Delete</button></td>
        </tr>`).join('')}</tbody>
    </table>` : `<div class="empty">No payments recorded yet.</div>`}
    </div></div>`;
}

/* ================= Campaigns ================= */

let campaignCache = [];

async function renderCampaigns() {
  campaignCache = await api('/campaigns');
  main.innerHTML = `
    <h2>AI Campaigns</h2>
    <p style="color:var(--ink-soft);margin-bottom:1rem">Your AI team builds these: <strong>Marco</strong> (strategist) brainstorms, <strong>Lucía</strong> (creative director) reviews and improves, and <strong>Valen</strong> (producer) creates the final ads — with real ad images from Higgsfield when configured. Review each draft, then mark it approved or live. Generate new ones from the Clients tab.</p>
    <div class="panel"><div class="table-wrap">
    ${campaignCache.length ? `<table>
      <thead><tr><th>Month</th><th>Client</th><th>Campaign</th><th>Status</th><th></th></tr></thead>
      <tbody>${campaignCache.map((k) => `
        <tr>
          <td>${esc(k.month)}</td>
          <td>${esc(k.clientName)}</td>
          <td><strong>${esc(k.plan.name)}</strong><div class="small">${esc(k.plan.objective)}</div></td>
          <td>
            <select data-campaign-status="${k.id}" aria-label="Campaign status">
              ${['draft', 'approved', 'live', 'archived'].map((s) => `<option ${k.status === s ? 'selected' : ''}>${s}</option>`).join('')}
            </select>
          </td>
          <td style="white-space:nowrap">
            <button class="btn btn-teal btn-sm" data-view="${k.id}">Open</button>
            <button class="btn btn-ghost btn-sm" data-del-campaign="${k.id}">Delete</button>
          </td>
        </tr>`).join('')}</tbody>
    </table>` : `<div class="empty">No campaigns yet. Go to Clients and hit “✨ New campaign”.</div>`}
    </div></div>`;
}

function showCampaign(k, clientName) {
  const p = k.plan;
  $('#modal-body').innerHTML = `
    <button class="close-x" onclick="document.getElementById('modal').close()" aria-label="Close">✕</button>
    <span class="pill ${k.status}">${k.status}</span> <strong>${esc(k.month)}</strong> ${clientName ? '· ' + esc(clientName) : ''}
    <h2 style="margin-top:0.4rem">${esc(p.name)}</h2>
    <p style="color:var(--ink-soft)">${esc(p.objective)}</p>
    ${k.team ? `<p class="small" style="color:var(--ink-muted)">Made by: Marco (strategy) → Lucía (creative direction) → Valen (production)${k.team.imagesBy ? ' · images by ' + esc(k.team.imagesBy) : ''}</p>` : ''}
    <h3>Strategy</h3><p>${esc(p.strategySummary)}</p>
    <h3>Target audience</h3><p>${esc(p.targetAudience)}</p>
    <h3>Budget split</h3>
    <ul style="padding-left:1.2rem">${p.budgetSplit.map((b) => `<li><strong>${esc(b.channel)} — ${b.percent}%</strong>: ${esc(b.rationale)}</li>`).join('')}</ul>
    <h3>Ads (ES / EN)</h3>
    ${p.ads.map((a) => `
      <div class="ad-card">
        ${a.imageUrl ? `<img src="${esc(a.imageUrl)}" alt="" style="width:100%;max-height:260px;object-fit:cover;border-radius:8px;margin-bottom:0.6rem">` : ''}
        <div class="platform">${esc(a.platform)}</div>
        <strong>${esc(a.headline)}</strong>
        <p>${esc(a.primaryText)}</p>
        <p class="small" style="color:var(--ink-muted)"><em>EN: ${esc(a.headlineEn)} — ${esc(a.primaryTextEn)}</em></p>
        <span class="pill draft">CTA: ${esc(a.cta)}</span>
        ${a.imageUrl ? ` <a href="${esc(a.imageUrl)}" target="_blank" rel="noopener" class="small">Open image ↗</a>` : ''}
      </div>`).join('')}
    <h3>4-week calendar</h3>
    ${p.weeklyCalendar.map((w) => `<p><strong>Week ${w.week} — ${esc(w.focus)}</strong></p><ul style="padding-left:1.2rem">${w.actions.map((a) => `<li>${esc(a)}</li>`).join('')}</ul>`).join('')}
    <h3>KPIs</h3>
    <ul style="padding-left:1.2rem">${p.kpis.map((x) => `<li>${esc(x)}</li>`).join('')}</ul>
    ${k.creativeBrief ? `<details style="margin-top:1rem"><summary style="cursor:pointer;font-weight:600">Lucía's creative brief (review &amp; improvements)</summary><pre style="white-space:pre-wrap;font-size:0.82rem;color:var(--ink-soft);margin-top:0.5rem">${esc(k.creativeBrief)}</pre></details>` : ''}
    <details style="margin-top:0.6rem"><summary style="cursor:pointer;font-weight:600">Marco's raw brainstorm</summary><pre style="white-space:pre-wrap;font-size:0.82rem;color:var(--ink-soft);margin-top:0.5rem">${esc(k.brainstorm)}</pre></details>
  `;
  $('#modal').showModal();
}

/* ================= Outbox ================= */

const OUTBOX_TYPES = {
  lead_reply: 'Lead auto-reply', monthly_checkin: 'Monthly check-in',
  payment_reminder: 'Payment reminder', weekly_digest: 'Weekly digest',
  telegram_chat: 'Telegram chat (Sofía)', sofia_app_chat: 'Sofía app chat',
  sofia_web_chat: 'Sofía web chat',
};

async function renderOutbox() {
  const outbox = await api('/outbox');
  main.innerHTML = `
    <h2>Outbox</h2>
    <p style="color:var(--ink-soft);margin-bottom:1rem">Everything the automations wrote. <span class="pill approved">sent</span> went out by email; <span class="pill draft">draft</span> is waiting for you to copy &amp; send (configure SMTP to send automatically); <span class="pill churned">failed</span> needs attention.</p>
    <div class="panel"><div class="table-wrap">
    ${outbox.length ? `<table>
      <thead><tr><th>When</th><th>Type</th><th>To</th><th>Subject</th><th>Status</th><th></th></tr></thead>
      <tbody>${outbox.map((o, i) => `
        <tr>
          <td>${new Date(o.createdAt).toLocaleDateString()}<div class="small">${new Date(o.createdAt).toLocaleTimeString()}</div></td>
          <td>${esc(OUTBOX_TYPES[o.type] || o.type)}${o.clientName ? `<div class="small">${esc(o.clientName)}</div>` : ''}</td>
          <td>${esc(o.to || '—')}</td>
          <td style="max-width:260px">${esc(o.subject)}</td>
          <td><span class="pill ${o.status === 'sent' ? 'approved' : o.status === 'failed' ? 'churned' : 'draft'}">${o.status}</span></td>
          <td><button class="btn btn-ghost btn-sm" data-outbox="${i}">View</button></td>
        </tr>`).join('')}</tbody>
    </table>` : `<div class="empty">Nothing yet. Turn on the automations in your .env (AUTO_LEAD_REPLY, AUTO_MONTHLY_CHECKINS, AUTO_PAYMENT_REMINDERS, WEEKLY_DIGEST) and messages will appear here.</div>`}
    </div></div>`;
  window._outboxCache = outbox;
}

function showOutboxMessage(o) {
  $('#modal-body').innerHTML = `
    <button class="close-x" onclick="document.getElementById('modal').close()" aria-label="Close">✕</button>
    <span class="pill ${o.status === 'sent' ? 'approved' : o.status === 'failed' ? 'churned' : 'draft'}">${o.status}</span>
    <h2 style="margin-top:0.4rem">${esc(o.subject)}</h2>
    <p class="small" style="color:var(--ink-muted)">${esc(OUTBOX_TYPES[o.type] || o.type)}${o.to ? ' · to ' + esc(o.to) : ''} · ${new Date(o.createdAt).toLocaleString()}</p>
    <div class="ad-card" style="white-space:pre-wrap;margin-top:1rem">${esc(o.message)}</div>
    <button class="btn btn-ghost btn-sm" id="copy-outbox">Copy message</button>`;
  $('#modal').showModal();
  $('#copy-outbox').addEventListener('click', () => {
    navigator.clipboard.writeText(o.message);
    toast('Copied to clipboard');
  });
}

/* ================= Sofía — client message drafting ================= */

const MSG_PURPOSES = [
  ['welcome', 'Welcome a new client'],
  ['monthly_update', 'Monthly check-in'],
  ['payment_reminder', 'Friendly payment reminder'],
  ['reply', 'Reply to a client message'],
  ['custom', 'Custom (describe below)'],
];

function showMessageDialog(clientId, clientLabel) {
  $('#modal-body').innerHTML = `
    <button class="close-x" onclick="document.getElementById('modal').close()" aria-label="Close">✕</button>
    <h2>💬 Draft a message — ${esc(clientLabel)}</h2>
    <p style="color:var(--ink-soft);margin:0.3rem 0 1rem">Sofía (client relations) writes it in Spanish and English. You review, copy and send it by WhatsApp or email.</p>
    <form id="msg-form" class="grid" style="display:grid;gap:0.7rem">
      <label style="font-size:0.78rem;font-weight:600;color:var(--ink-soft)">What kind of message?
        <select name="purpose">${MSG_PURPOSES.map(([v, l]) => `<option value="${v}">${l}</option>`).join('')}</select>
      </label>
      <label style="font-size:0.78rem;font-weight:600;color:var(--ink-soft)">Context (optional — e.g. paste the client's message, or describe what to say)
        <textarea name="context" rows="3"></textarea>
      </label>
      <div><button class="btn btn-primary" id="msg-go">Ask Sofía to write it</button></div>
    </form>
    <div id="msg-result"></div>`;
  $('#modal').showModal();

  $('#msg-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = $('#msg-go');
    btn.disabled = true;
    btn.textContent = 'Sofía is writing…';
    try {
      const body = Object.fromEntries(new FormData(e.target));
      const m = await api('/clients/' + clientId + '/message', { method: 'POST', body });
      $('#msg-result').innerHTML = `
        <h3>Español — ${esc(m.subjectEs)}</h3>
        <div class="ad-card" style="white-space:pre-wrap">${esc(m.messageEs)}</div>
        <button class="btn btn-ghost btn-sm" data-copy="es">Copy Spanish</button>
        <h3>English — ${esc(m.subjectEn)}</h3>
        <div class="ad-card" style="white-space:pre-wrap">${esc(m.messageEn)}</div>
        <button class="btn btn-ghost btn-sm" data-copy="en">Copy English</button>`;
      $('#msg-result').addEventListener('click', (ev) => {
        if (ev.target.dataset?.copy) {
          navigator.clipboard.writeText(ev.target.dataset.copy === 'es' ? m.messageEs : m.messageEn);
          toast('Copied to clipboard');
        }
      });
    } catch (err) {
      $('#msg-result').innerHTML = `<div class="notice warn">${esc(err.message)}</div>`;
    }
    btn.disabled = false;
    btn.textContent = 'Ask Sofía to write it';
  });
}

/* ================= Settings (edit the website) ================= */

async function renderSettings() {
  const s = await api('/settings');
  main.innerHTML = `
    <h2>Website settings</h2>
    <p style="color:var(--ink-soft);margin-bottom:1rem">These change your live website <strong>instantly</strong> — no deploy, no code. For bigger edits (texts, sections, design), edit the files on GitHub or ask Claude.</p>
    <div class="panel">
      <form class="grid" id="settings-form">
        <label>Telegram bot username (the "Chat with Sofía" button — no @)
          <input name="telegram" value="${esc(s.telegram || '')}" placeholder="yourlocallift_bot" required>
        </label>
        <label>WhatsApp number (kept for future use — country code + digits)
          <input name="whatsapp" value="${esc(s.whatsapp)}" placeholder="15551234567" pattern="[0-9]{8,15}">
        </label>
        <label>Contact email (shown in the footer)
          <input name="email" type="email" value="${esc(s.email)}" required>
        </label>
        <label>Plan 1 price — Inicial / Starter ($/month)
          <input name="price1" type="number" min="1" value="${s.price1}" required>
        </label>
        <label>Plan 2 price — Crecimiento / Growth ($/month)
          <input name="price2" type="number" min="1" value="${s.price2}" required>
        </label>
        <label>Plan 3 price — Pro ($/month)
          <input name="price3" type="number" min="1" value="${s.price3}" required>
        </label>
        <div><button class="btn btn-primary">Save — updates the live site</button></div>
      </form>
      <p class="small" style="color:var(--ink-muted);margin-top:0.8rem">Applies to both the Spanish and English pages. Tip: after changing prices, check the pricing section on your site to confirm it looks right.</p>
    </div>`;
}

/* ================= Global delegated events ================= */

main.addEventListener('change', async (e) => {
  const d = e.target.dataset || {};
  try {
    if (d.leadStatus) { await api('/leads/' + d.leadStatus, { method: 'PATCH', body: { status: e.target.value } }); toast('Lead updated'); }
    if (d.clientStatus) { await api('/clients/' + d.clientStatus, { method: 'PATCH', body: { status: e.target.value } }); toast('Client updated'); }
    if (d.campaignStatus) { await api('/campaigns/' + d.campaignStatus, { method: 'PATCH', body: { status: e.target.value } }); toast('Campaign updated'); }
  } catch (err) { alert(err.message); }
});

main.addEventListener('click', async (e) => {
  const d = e.target.dataset || {};
  try {
    if (d.convert) {
      const fee = prompt('Monthly fee for this client ($)?', '399');
      if (fee === null) return;
      await api('/leads/' + d.convert + '/convert', { method: 'POST', body: { monthlyFee: Number(fee) } });
      toast('Converted to client 🎉');
      renderLeads();
    }
    if (d.delLead && confirm('Delete this lead?')) { await api('/leads/' + d.delLead, { method: 'DELETE' }); renderLeads(); }
    if (d.gen) {
      const btn = e.target;
      btn.disabled = true;
      btn.textContent = 'Agents working…';
      try {
        const campaign = await api('/clients/' + d.gen + '/campaigns', { method: 'POST', body: {} });
        toast(`Campaign "${campaign.plan.name}" created`);
        showCampaign(campaign, '');
      } catch (err) {
        alert('Campaign generation failed: ' + err.message);
      }
      btn.disabled = false;
      btn.textContent = '✨ Campaign';
    }
    if (d.msg) {
      const cell = e.target.closest('tr')?.querySelector('td');
      const label = cell?.childNodes[0]?.textContent.trim() || 'client';
      showMessageDialog(d.msg, label);
    }
    if (d.delClient && confirm('Delete this client and their payments/campaigns?')) { await api('/clients/' + d.delClient, { method: 'DELETE' }); renderClients(); }
    if (d.delPayment && confirm('Delete this payment?')) { await api('/payments/' + d.delPayment, { method: 'DELETE' }); renderPayments(); }
    if (d.view) {
      const k = campaignCache.find((c) => c.id === d.view);
      if (k) showCampaign(k, k.clientName);
    }
    if (d.delCampaign && confirm('Delete this campaign?')) { await api('/campaigns/' + d.delCampaign, { method: 'DELETE' }); renderCampaigns(); }
    if (d.outbox !== undefined && window._outboxCache) showOutboxMessage(window._outboxCache[Number(d.outbox)]);
  } catch (err) { alert(err.message); }
});

main.addEventListener('submit', async (e) => {
  e.preventDefault();
  const body = Object.fromEntries(new FormData(e.target));
  try {
    if (e.target.id === 'client-form') { await api('/clients', { method: 'POST', body }); toast('Client added'); renderClients(); }
    if (e.target.id === 'payment-form') { await api('/payments', { method: 'POST', body }); toast('Payment recorded 💸'); renderPayments(); }
    if (e.target.id === 'settings-form') { await api('/settings', { method: 'PATCH', body }); toast('Saved — your live site is updated ✨'); renderSettings(); }
  } catch (err) { alert(err.message); }
});

/* ================= Router ================= */

const tabs = { dashboard: renderDashboard, leads: renderLeads, clients: renderClients, payments: renderPayments, campaigns: renderCampaigns, outbox: renderOutbox, settings: renderSettings };

$('#nav').addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-tab]');
  if (!btn) return;
  document.querySelectorAll('#nav button').forEach((b) => b.classList.toggle('on', b === btn));
  tabs[btn.dataset.tab]().catch((err) => { main.innerHTML = `<div class="notice warn">Error: ${esc(err.message)}</div>`; });
});

renderDashboard();
</script>
</body>
</html>
